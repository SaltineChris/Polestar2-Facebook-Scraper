<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polestar 2 NZ Listings Tracker</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0a0e17;
      --bg-card: rgba(18, 26, 42, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #00e5ff; /* Electric cyan */
      --accent-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      --new-tag-bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
      --new-tag-text: #7b1fa2;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --shadow-glow: 0 0 20px rgba(0, 229, 255, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 40%);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 2rem 1.5rem;
    }

    /* Core Layout */
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    /* Stats Overview */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 229, 255, 0.3);
      box-shadow: var(--shadow-glow);
    }

    .stat-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent-gradient);
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      margin-top: 0.5rem;
      line-height: 1;
    }

    /* Search and Filters */
    .controls-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .controls-top {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 280px;
    }

    .search-box input {
      width: 100%;
      background: rgba(10, 14, 23, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
    }

    .search-box::after {
      content: "🔍";
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      opacity: 0.6;
    }

    .filter-group-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 1rem;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .filter-group-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filters {
      display: flex;
      gap: 0.5rem;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent-color);
      color: #0a0e17;
      border-color: var(--accent-color);
      font-weight: 600;
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
    }

    /* Table & Card Wrapper */
    .table-container {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(10, 14, 23, 0.5);
      padding: 1.25rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
      color: var(--text-main);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr {
      transition: background-color 0.2s;
    }

    tr:hover {
      background-color: rgba(255, 255, 255, 0.02);
    }

    /* Listing elements style */
    .listing-thumbnail {
      width: 90px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(135deg, #1e293b, #0f172a);
    }

    .thumbnail-fallback {
      width: 90px;
      height: 60px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 1.5rem;
    }

    .listing-info {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .listing-details {
      display: flex;
      flex-direction: column;
    }

    .listing-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      transition: color 0.2s;
    }

    .listing-title:hover {
      color: var(--accent-color);
      text-decoration: underline;
    }

    .listing-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .listing-price {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent-color);
    }

    /* Tags */
    .tag {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tag-new {
      background: var(--new-tag-bg);
      color: #1e1b4b;
      box-shadow: 0 0 10px rgba(255, 154, 158, 0.2);
    }

    .tag-source {
      border: 1px solid currentColor;
      font-weight: 600;
    }

    .source-facebook {
      background: rgba(24, 119, 242, 0.15);
      color: #3b5998;
      border-color: rgba(24, 119, 242, 0.3);
    }

    .source-trademe {
      background: rgba(255, 126, 0, 0.15);
      color: #ff7e00;
      border-color: rgba(255, 126, 0, 0.3);
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: var(--accent-gradient);
      color: #0a0e17;
      font-weight: 600;
      border-color: transparent;
      box-shadow: var(--shadow-glow);
    }

    /* Empty state */
    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }
      
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      
      th:nth-child(3), td:nth-child(3) {
        display: none; /* Hide location column on small screens */
      }
      
      .controls-card {
        align-items: stretch;
      }

      .filter-group-container {
        flex-direction: column;
        gap: 1rem;
      }
      
      .filters {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 0.25rem;
      }
      
      .filter-btn {
        flex: 1;
        white-space: nowrap;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <h1>Polestar 2 NZ Tracker</h1>
        <p>Facebook Marketplace & TradeMe Motor Aggregator</p>
      </div>
      <div>
        <button class="filter-btn" id="refreshBtn">🔄 Refresh Data</button>
      </div>
    </header>

    <!-- Stats Panel -->
    <div class="stats-container">
      <div class="stat-card">
        <span class="stat-label">Total Listings</span>
        <span class="stat-value" id="statTotal">-</span>
      </div>
      <div class="stat-card" style="border-left-color: #3b5998;">
        <span class="stat-label">Facebook Ads</span>
        <span class="stat-value" id="statFacebook" style="color: #a5b4fc;">-</span>
      </div>
      <div class="stat-card" style="border-left-color: #ff7e00;">
        <span class="stat-label">TradeMe Cars</span>
        <span class="stat-value" id="statTradeMe" style="color: #fed7aa;">-</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">New Today</span>
        <span class="stat-value" id="statNew" style="color: #ff9a9e;">-</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Last Checked</span>
        <span class="stat-value" id="statLastChecked" style="font-size: 1.05rem; line-height: 1.8;">-</span>
      </div>
    </div>

    <!-- Search & Filters -->
    <div class="controls-card">
      <div class="controls-top">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by title, price, or location...">
        </div>
      </div>
      
      <div class="filter-group-container">
        <div class="filter-group">
          <span class="filter-group-label">Filter:</span>
          <div class="filters" id="timeFilters">
            <button class="filter-btn active" data-filter="all">All Items</button>
            <button class="filter-btn" data-filter="new">New Additions</button>
            <button class="filter-btn" data-filter="recent">Last 3 Days</button>
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-group-label">Source:</span>
          <div class="filters" id="sourceFilters">
            <button class="filter-btn active" data-source="all">All Sources</button>
            <button class="filter-btn" data-source="facebook">Facebook</button>
            <button class="filter-btn" data-source="trademe">TradeMe</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Listings Table -->
    <div class="table-container">
      <table id="listingsTable">
        <thead>
          <tr>
            <th>Vehicle Details</th>
            <th>Price</th>
            <th>Location</th>
            <th style="width: 120px;">Action</th>
          </tr>
        </thead>
        <tbody id="listingsBody">
          <!-- Dynamically inserted listings -->
          <tr>
            <td colspan="4" class="empty-state">
              <div class="empty-icon">⏳</div>
              <p>Loading listings data...</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Data Script -->
  <script src="listings.js"></script>

  <!-- Controller Logic -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Elements
      const body = document.getElementById("listingsBody");
      const searchInput = document.getElementById("searchInput");
      const timeFilterBtns = document.querySelectorAll("#timeFilters .filter-btn");
      const sourceFilterBtns = document.querySelectorAll("#sourceFilters .filter-btn");
      const statTotal = document.getElementById("statTotal");
      const statFacebook = document.getElementById("statFacebook");
      const statTradeMe = document.getElementById("statTradeMe");
      const statNew = document.getElementById("statNew");
      const statLastChecked = document.getElementById("statLastChecked");
      const refreshBtn = document.getElementById("refreshBtn");

      let listings = window.marketplaceListings || [];
      let activeFilter = "all";
      let activeSource = "all";
      let searchQuery = "";

      // Format Date nicely
      function formatDate(isoString) {
        if (!isoString) return "N/A";
        const date = new Date(isoString);
        return date.toLocaleDateString('en-NZ', { 
          day: 'numeric', 
          month: 'short', 
          hour: '2-digit', 
          minute: '2-digit' 
        });
      }

      // Check if item was added within N days
      function isWithinDays(isoString, days) {
        if (!isoString) return false;
        const date = new Date(isoString);
        const now = new Date();
        const diffTime = Math.abs(now - date);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return diffDays <= days;
      }

      // Render Listings Table
      function render() {
        // Filter & Search Logic
        const filtered = listings.filter(item => {
          // Search Query Match
          const matchesSearch = 
            item.title.toLowerCase().includes(searchQuery) ||
            item.price.toLowerCase().includes(searchQuery) ||
            item.location.toLowerCase().includes(searchQuery);

          if (!matchesSearch) return false;

          // Category Filters
          if (activeFilter === "new" && !item.is_new) {
            return false;
          } else if (activeFilter === "recent" && !isWithinDays(item.scraped_at, 3)) {
            return false;
          }

          // Source Filters
          if (activeSource !== "all" && item.source !== activeSource) {
            return false;
          }

          return true;
        });

        // Sort by scraped date (newest first)
        filtered.sort((a, b) => new Date(b.scraped_at) - new Date(a.scraped_at));

        if (filtered.length === 0) {
          body.innerHTML = `
            <tr>
              <td colspan="4" class="empty-state">
                <div class="empty-icon">🚗</div>
                <p>No Polestar 2 vehicles found matching your filters.</p>
              </td>
            </tr>
          `;
          return;
        }

        body.innerHTML = filtered.map(item => {
          // Detect image fallback
          const imageEl = item.image 
            ? `<img class="listing-thumbnail" src="${item.image}" referrerpolicy="no-referrer" alt="${item.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
            : '';
          
          const fallbackEl = `
            <div class="thumbnail-fallback" style="${item.image ? 'display:none;' : ''}">
              ⚡
            </div>
          `;

          // Generate "New" badge
          const newBadge = item.is_new 
            ? `<span class="tag tag-new">New</span>` 
            : '';

          // Generate Source badge
          const sourceText = item.source === "facebook" ? "Facebook" : "TradeMe";
          const sourceClass = item.source === "facebook" ? "source-facebook" : "source-trademe";
          const sourceBadge = `<span class="tag tag-source ${sourceClass}">${sourceText}</span>`;

          return `
            <tr>
              <td>
                <div class="listing-info">
                  <div style="position: relative;">
                    ${imageEl}
                    ${fallbackEl}
                  </div>
                  <div class="listing-details">
                    <a href="${item.url}" target="_blank" class="listing-title">${item.title}</a>
                    <div class="listing-meta">
                      <span>Added: ${formatDate(item.scraped_at)}</span>
                      ${sourceBadge}
                      ${newBadge}
                    </div>
                  </div>
                </div>
              </td>
              <td>
                <div class="listing-price">${item.price}</div>
              </td>
              <td>
                <div style="font-weight: 500;">${item.location}</div>
              </td>
              <td>
                <a href="${item.url}" target="_blank" class="action-btn">View Listing</a>
              </td>
            </tr>
          `;
        }).join("");
      }

      // Update Statistics
      function updateStats() {
        statTotal.textContent = listings.length;
        
        const fbCount = listings.filter(item => item.source === "facebook").length;
        statFacebook.textContent = fbCount;
        
        const tmCount = listings.filter(item => item.source === "trademe").length;
        statTradeMe.textContent = tmCount;
        
        const newCount = listings.filter(item => item.is_new).length;
        statNew.textContent = newCount;

        // Find last sync time from window.lastChecked
        if (window.lastChecked) {
          statLastChecked.textContent = formatDate(window.lastChecked);
        } else if (listings.length > 0) {
          const dates = listings.map(item => new Date(item.scraped_at));
          const latestDate = new Date(Math.max(...dates));
          statLastChecked.textContent = formatDate(latestDate.toISOString());
        } else {
          statLastChecked.textContent = "Never";
        }
      }

      // Search Event Listener
      searchInput.addEventListener("input", (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        render();
      });

      // Time Filter Buttons Event Listener
      timeFilterBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
          timeFilterBtns.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeFilter = btn.getAttribute("data-filter");
          render();
        });
      });

      // Source Filter Buttons Event Listener
      sourceFilterBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
          sourceFilterBtns.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeSource = btn.getAttribute("data-source");
          render();
        });
      });

      // Refresh Button Event Listener
      refreshBtn.addEventListener("click", () => {
        window.location.reload();
      });

      // Initialize
      updateStats();
      render();
    });
  </script>
</body>
</html>
